<!doctype html>
<html lang="ha">
  <head>
    <base href="/app/" />
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#1B4332" />
    <meta
      name="description"
      content="AJAMIX — Offline mathematics education in Ajami for tsangaya students"
    />
    <link rel="manifest" href="./manifest.json" />
    <link
      rel="preload"
      href="./fonts/NotoNaskhArabic-Regular.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link rel="stylesheet" href="./styles.css" />
    <title>AJAMIX — Koyon Lissafi da Ajami</title>
  </head>
  <body>
    <div class="app-shell">
      <header class="shell-header">
        <div>
          <p class="eyebrow">AJAMIX</p>
          <h1 class="brand-title">Koyon Lissafi da Ajami</h1>
          <p class="ajami brand-ajami">كويوں لِسّافِى دا عجمى</p>
        </div>
        <div class="header-meta">
          <span id="selected-grade-chip" class="meta-chip">Foundation</span>
          <span id="connection-status" class="meta-chip is-online">Kan layi</span>
        </div>
      </header>

      <main id="app-root" class="shell-main" aria-live="polite">
        <section class="screen loading-screen">
          <p class="eyebrow">Ana lodawa</p>
          <h2>AJAMIX yana shirya darussa a na'urar nan.</h2>
          <p>
            Manhajar tana aiki ba tare da login ba, kuma tana adana ci gaban koyo
            a wannan wayar kawai.
          </p>
        </section>
      </main>
    </div>

    <noscript>
      <div class="noscript-banner">
        Wannan manhaja tana bukatar JavaScript domin darussa da ajiyar ci gaba su
        yi aiki.
      </div>
    </noscript>

    <script defer src="./app.js"></script>
    <script>
      window.addEventListener("load", function () {
        if (!("serviceWorker" in navigator)) {
          return;
        }

        navigator.serviceWorker
          .register("./sw.js", { scope: "/app/" })
          .catch(function (error) {
            console.error("AJAMIX service worker registration failed:", error);
          });
      });
    </script>
  </body>
</html>
